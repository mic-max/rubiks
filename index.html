<!doctype html>
<html lang="en">
<head>
  <title>Rubix Cube</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.png">
</head>
<body>
  <div id="layout">

    <div id="leftPanel">
      <h1>Rubix Cube</h1>
      <p class="instructions">Scroll to rotate slices. Left/right-click to rotate layers.</p>
      <p class="instructions">In dual mode, the other cube is the flipped view.</p>
      <label class="toggle">Debug<input id="debug" type="checkbox" onchange="debug()"><span></span></label>
      <label class="toggle">Wonky<input id="wonky" type="checkbox" onchange="wonky()"><span></span></label>
      <label class="toggle">Dual<input id="dual" type="checkbox" onchange="toggleDualView()"><span></span></label>
      <div id="paint-row">
        <label class="toggle">Paint<input id="paint" type="checkbox" onchange="togglePaintMode()"><span></span></label>
      </div>

      <button onclick="resetCubeState(); updatePolygons(); resetMoveCounter();">Reset</button>
      <div id="shuffle-row">
        <button onclick="shuffle()">Shuffle</button>
        <div class="stepper">
          <button class="stepper-btn" onclick="adjustShuffleMoves(-1)">−</button>
          <input type="number" id="shuffleMoves" name="shuffleMoves" value="5" min="1" max="99" />
          <button class="stepper-btn" onclick="adjustShuffleMoves(1)">+</button>
        </div>
      </div>
      <button id="solve-btn" onclick="solve()">Solve</button>

      <div id="panel-footer">
        <a href="https://github.com/mic-max/rubix" target="_blank">GitHub</a>
        <a href="https://github.com/mic-max/rubix/issues/new?template=bug_report.md" target="_blank">Bug Report</a>
        <a href="https://github.com/mic-max/rubix/issues/new?template=feature_request.md" target="_blank">Feature Request</a>
        <span>Made by <a href="https://github.com/mic-max" target="_blank">mic-max</a></span>
        <span id="build-info"></span>
      </div>
    </div>

    <div id="main">
      <button id="share-btn" onclick="share()" title="Copy link to clipboard">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        <span id="share-label">Copy link</span>
      </button>
      <div id="cubes" oncontextmenu="return false"></div>
    </div>

    <div id="colour-legend"></div>

    <div id="moveHistoryPanel">
      <div id="moveHistoryHeader">&nbsp;&nbsp;No. Move</div>
      <div id="moveHistory"></div>
      <div id="moveHistoryFooter">
        Move: <span id="moveNumber">0</span>
        <button onclick="resetMoveCounter()">Reset</button>
      </div>
    </div>

  </div>

  <div id="movePanel"></div>

<script src="cube.js"></script>
  <script src="index.js"></script>
</body>
</html>
